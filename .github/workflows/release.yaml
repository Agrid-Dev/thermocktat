name: Release

on:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/thermocktat"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Resolve image SHA
        id: resolve
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"

          # For merge commits, the PR head SHA (2nd parent) is what CI tagged.
          # For non-merge commits, fall back to HEAD.
          for SHA in $(git rev-parse HEAD^2 2>/dev/null) $(git rev-parse HEAD); do
            TAG="sha-${SHA::7}"
            if docker buildx imagetools inspect "${IMAGE}:${TAG}" > /dev/null 2>&1; then
              echo "Found image at ${IMAGE}:${TAG}"
              echo "tag=${TAG}" >> $GITHUB_OUTPUT
              exit 0
            fi
          done

          echo "::error::No image found for this commit. Ensure CI passed on the PR."
          exit 1

      - name: Retag image with version and latest
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"

          docker buildx imagetools create \
            -t "${IMAGE}:${{ github.ref_name }}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${{ steps.resolve.outputs.tag }}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes "${{ steps.meta.outputs.image }}:${{ github.ref_name }}"

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > /tmp/changelog.md
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" >> /tmp/changelog.md
          else
            echo "## Initial release" > /tmp/changelog.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/changelog.md
