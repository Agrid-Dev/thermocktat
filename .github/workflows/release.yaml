name: Release

on:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]

permissions:
  contents: write
  packages: write
  id-token: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find CI run that tested this commit
        id: ci-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Try the tagged commit first, then its second parent (PR head
          # before the merge commit) since CI runs against PR branches.
          for SHA in "${{ github.sha }}" "$(git rev-parse HEAD^2 2>/dev/null || true)"; do
            [ -z "$SHA" ] && continue
            RUN_ID=$(gh run list \
              --workflow ci.yaml \
              --commit "$SHA" \
              --status success \
              --json databaseId \
              --jq '.[0].databaseId')
            [ -n "$RUN_ID" ] && break
          done

          if [ -z "$RUN_ID" ]; then
            echo "::error::No successful CI run found for tag ${{ github.ref_name }}. Ensure CI passed before tagging."
            exit 1
          fi
          echo "Found CI run: $RUN_ID (commit: $SHA)"
          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT

      - name: Download amd64 image artifact
        uses: actions/download-artifact@v8
        with:
          name: image-amd64
          path: /tmp/
          run-id: ${{ steps.ci-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download arm64 image artifact
        uses: actions/download-artifact@v8
        with:
          name: image-arm64
          path: /tmp/
          run-id: ${{ steps.ci-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/thermocktat"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Push platform images
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          VERSION="${{ github.ref_name }}"

          for arch in amd64 arm64; do
            skopeo copy \
              --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              "docker-archive:/tmp/image-${arch}.tar" \
              "docker://${IMAGE}:${VERSION}-${arch}"
          done

      - name: Create and push manifest
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          VERSION="${{ github.ref_name }}"

          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

      - name: Install cosign
        uses: sigstore/cosign-installer@v4

      - name: Sign image
        run: |
          cosign sign --yes "${{ steps.meta.outputs.image }}:${{ github.ref_name }}"

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > /tmp/changelog.md
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" >> /tmp/changelog.md
          else
            echo "## Initial release" > /tmp/changelog.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/changelog.md
