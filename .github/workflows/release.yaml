name: Release

on:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/thermocktat"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Find PR that delivered this commit
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"

          # Find the PR that merged this commit (or its parent for merge commits)
          PR=$(gh pr list --repo "${{ github.repository }}" --state merged --search "${{ github.sha }}" \
            --json number --jq '.[0].number')

          if [ -z "$PR" ]; then
            # For merge commits, try the second parent (PR head)
            PARENT=$(git rev-parse HEAD^2 2>/dev/null || true)
            if [ -n "$PARENT" ]; then
              PR=$(gh pr list --repo "${{ github.repository }}" --state merged --search "$PARENT" \
                --json number --jq '.[0].number')
            fi
          fi

          if [ -z "$PR" ]; then
            echo "::error::No merged PR found for this commit. Tag a commit that was delivered via PR."
            exit 1
          fi

          TAG="pr-${PR}"
          if ! docker buildx imagetools inspect "${IMAGE}:${TAG}" > /dev/null 2>&1; then
            echo "::error::Image ${IMAGE}:${TAG} not found. Ensure CI passed on PR #${PR}."
            exit 1
          fi

          echo "Found image at ${IMAGE}:${TAG} (PR #${PR})"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Retag image with version and latest
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"

          docker buildx imagetools create \
            -t "${IMAGE}:${{ github.ref_name }}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${{ steps.resolve.outputs.tag }}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes "${{ steps.meta.outputs.image }}:${{ github.ref_name }}"

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > /tmp/changelog.md
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" >> /tmp/changelog.md
          else
            echo "## Initial release" > /tmp/changelog.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/changelog.md
