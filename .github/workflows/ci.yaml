name: CI

on:
  pull_request:
    paths:
      - "cmd/**"
      - "internal/**"
      - "integration/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/ci.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-lint-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tools
        run: |
          go install golang.org/x/tools/gopls@latest
          go install golang.org/x/tools/cmd/goimports@latest

      - name: gofmt check
        run: |
          test -z "$(gofmt -l .)" || (echo "gofmt needed; run: gofmt -w ." && exit 1)

      - name: goimports check (optional but recommended)
        run: |
          test -z "$(goimports -l .)" || (echo "goimports needed; run: goimports -w ." && exit 1)

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code

      - name: gopls check (lint)
        run: |
          gopls check $(find . -name '*.go' -not -path './integration/*')

      - name: go vet
        run: |
          go vet ./...

      - name: Build
        run: |
          mkdir -p .bin
          CGO_ENABLED=0 go build -o .bin/thermocktat ./cmd/thermocktat/main.go

      - name: Run tests (with coverage)
        run: |
          go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Binary for Integration Tests
        uses: actions/upload-artifact@v7
        with:
          name: thermocktat-binary
          path: .bin/thermocktat
          retention-days: 7

  docker-build:
    needs: [test-lint-build, app-integration-tests]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
          - platform: linux/arm64
            suffix: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          tags: thermocktat:ci-${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
          build-args: |
            VERSION=pr-${{ github.event.pull_request.number || 0 }}
            COMMIT=${{ github.event.pull_request.head.sha || github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
          outputs: type=docker,dest=/tmp/image-${{ matrix.suffix }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: image-${{ matrix.suffix }}
          path: /tmp/image-${{ matrix.suffix }}.tar
          retention-days: 7

  docker-scan:
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Download amd64 image
        uses: actions/download-artifact@v8
        with:
          name: image-amd64
          path: /tmp/

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          input: /tmp/image-amd64.tar
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  app-integration-tests:
    needs: test-lint-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Lint and Type Check (Python)
        run: |
          cd integration
          uv sync
          uv run ruff check .
          uv run ruff format --check .
          uv run ty check

      - name: Write mosquitto config (allow anonymous)
        run: |
          cat > /tmp/mosquitto.conf <<'EOF'
          listener 1883 0.0.0.0
          allow_anonymous true
          persistence false
          EOF

      - name: Start Mosquitto Broker
        run: |
          docker run -d --name mosquitto \
            -p 1883:1883 \
            -v /tmp/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro \
            eclipse-mosquitto:2.0

      - name: Download Binary
        uses: actions/download-artifact@v8
        with:
          name: thermocktat-binary
          path: integration/.bin/

      - name: Fix permissions
        run: chmod +x integration/.bin/thermocktat

      - name: Run pytest
        run: |
          cd integration
          uv run pytest

  docker-integration-tests:
    needs: docker-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        protocol: [http, modbus, bacnet, mqtt, knx]
        include:
          - protocol: mqtt
            needs_mosquitto: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: |
          cd integration
          uv sync

      - name: Download amd64 image
        uses: actions/download-artifact@v8
        with:
          name: image-amd64
          path: /tmp/

      - name: Load image
        run: docker load -i /tmp/image-amd64.tar

      - name: Start Mosquitto Broker
        if: matrix.needs_mosquitto
        run: |
          cat > /tmp/mosquitto.conf <<'EOF'
          listener 1883 0.0.0.0
          allow_anonymous true
          persistence false
          EOF
          docker run -d --name mosquitto \
            -p 1883:1883 \
            -v /tmp/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro \
            eclipse-mosquitto:2.0

      - name: Run docker integration tests (${{ matrix.protocol }})
        run: |
          cd integration
          uv run pytest test_${{ matrix.protocol }}_control.py \
            --docker-image thermocktat:ci-amd64 -v
