name: CI Python Client

on:
  pull_request:
    paths:
      - "clients/python/**"
      - ".github/workflows/ci-python-client.yaml"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: clients/python

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type check
        run: uv run pyright

      - name: Pytest (with coverage)
        run: uv run pytest --cov=thermocktat_client --cov-report=term-missing --cov-report=xml --cov-fail-under=90

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: clients/python/coverage.xml

      - name: Build sdist and wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thermocktat-client-dist
          path: clients/python/dist/
          retention-days: 7
